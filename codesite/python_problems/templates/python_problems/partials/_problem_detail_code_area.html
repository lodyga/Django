<div class="row mb-2">
  <button class="btn btn-outline-secondary py-0 mb-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#problemCode"
          aria-expanded="false"
          aria-controls="problemCode">
    Code:
    <i class="fas fa-chevron-up"></i>
  </button>
  <div class="row collapse show" id="problemCode">
  <div class="col">
    <div class="row">
      <div class="col">
        <span class="badge bg-secondary col-auto">Code input:</span>
        <form id="codeForm"
              action="{% url 'python_problems:problem-detail' problem.slug language.name %}"
              method="post"
              class="mb-2">
          {% csrf_token %}
          <input id="codeFormAction" name="code_form_action" type="hidden" value="">
          <div class="code-area-container border border-warning">
            <textarea cols="80" id="codeContainer" name="code_container" rows="20">{{ source_code }}</textarea>
          </div>
          <div class="row">
            <div class="col-auto">
              <button class="btn btn-warning py-0 {% if language_id > 2 and language_id < 6 %}d-none{% endif %}"
                      id="runCodeButton"
                      name="run_code_button"
                      title="Ctrl + '"
                      type="button"
                      value="True">
                Run
                <span class="spinner-border spinner-border-sm d-none"
                      id="runCodeButtonSpinner"></span>
              </button>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary py-0 {% if language_id > 2 and language_id < 6 %}d-none{% endif %}"
                      id="testCodeButton"
                      name="test_code_button"
                      type="button"
                      title="Ctrl + Enter"
                      value="True">
                Validate
                <span class="spinner-border spinner-border-sm d-none"
                      id="testCodeButtonSpinner"></span>
              </button>
            </div>
            <div class="col-auto">
              <button class="btn btn-success py-0"
                      id="submitCodeButton"
                      name="submit_code_button"
                      type="button"
                      title="Save the code for posterity."
                      value="True">
                Submit
                <span class="spinner-border spinner-border-sm d-none"
                      id="submitCodeButtonSpinner"></span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div class="row mb-2">
      <div>
        <span class="badge bg-secondary col-auto">Code output:</span>
        <div class="form-control mb-2 col-auto" name="output_container">{{ output_container }}</div>
      </div>
    </div>
    {% if "TypeError: 'type' object is not subscriptable" in output_container %}
      <div class="alert alert-danger">
        <b>Python 3.8: Import types from typing (e.g., List[str] instead of list[str]).</b>
      </div>
    {% endif %}
  </div>
</div>
</div>
