<a href="{% url 'core:index' %}"
  class="btn btn-secondary px-3 py-0 mt-3 mb-5">Back</a>
<div class="mb-3">
  <label for="search_bar" class="form-label">
    <b>Search tab:</b>
  </label>
  <hr>
  <form method="get" id="search_bar">
    <!-- Search Box -->
    <label for="search_box" class="form-label">
      <b>Search box:</b>
    </label>
    <div class="input-group mb-3">
      <input class="p-2 mb-1"
             id="search_box"
             name="query_text"
             placeholder="Search by tag or title"
             style="border-radius: 0.35rem"
             type="text"
             value="{{ query_text }}">
      <button class="btn btn-primary px-2 py-0"
              style="border-radius: 0.35rem"
              type="submit">
        Search
      </button>
    </div>
    <!-- Difficulty Filter -->
    <label for="difficulty" class="form-label">
      <b>Difficulty:</b>
    </label>
    <select class="form-select mb-3"
            id="difficulty"
            name="difficulty_id"
            onchange="this.form.submit()"
            style="width: auto">
      <option value="0"{% if difficulty_id == 0 %} selected{% endif %}>All</option>
      {% for difficulty in difficulty_list %}
        <option value="{{ difficulty.id }}"
                {% if difficulty.id == difficulty_id %}selected{% endif %}>
          {{ difficulty }}
        </option>
      {% endfor %}
    </select>
    <!-- Tag Filter -->
    <label for="tags">
      <b>Tag:</b>
    </label>
    <select class="form-select mb-3"
            id="tag"
            name="tag_id"
            onchange="this.form.submit()"
            style="width: auto">
      <option value="0"{% if tag_id == 0 %} selected{% endif %}>All</option>
        {% for tag in tag_list.all %}
          <option value="{{ tag.id }}"
                  {% if tag.id == tag_id %}selected{% endif %}>
            {{ tag }}
          </option>
        {% endfor %}
    </select>
    <!-- Select Language -->
    <label for="language" class="form-label">
      <b>Language:</b>
    </label>
    <select class="form-select mb-3"
            id="language"
            name="language_id"
            onchange="this.form.submit()"
            style="width: auto;">
      <option value="0"{% if language_id == 0 %} selected{% endif %}>All</option>
      {% for language in language_list.all %}
        <option value="{{ language.id }}"
                {% if language.id == language_id %}selected{% endif %}>
          {{ language }}
        </option>
      {% endfor %}
    </select>
    <!-- Order by -->
    <label for="order_by" class="form-label">
      <b>Order by:</b>
    </label>
    <select class="form-select mb-3"
            id="order_by"
            name="order_by"
            onchange="this.form.submit()"
            style="width: auto">
      <option value="difficulty"
              {% if order_by == "difficulty" %}selected{% endif %}>Difficulty
      </option>
      <option value="title"
              {% if order_by == "title" %}selected{% endif %}>Title
      </option>
      <option value="owner"
              {% if order_by == "owner" %}selected{% endif %}>Author
      </option>
      <option value="created_at"
              {% if order_by == "created_at" %}selected{% endif %}>Creation date
      </option>
      <option value="updated_at"
              {% if order_by == "updated_at" %}selected{% endif %}>Update date
      </option>
    </select>
    
    <!-- Problems Per Page Dropdown -->
    <label for="problems_per_page_primary" class="form-label">
      <b>Problems per page:</b>
    </label>
    <select class="form-select mb-3"
        id="problems_per_page"
        name="problems_per_page"
        onchange="this.form.submit()"
        style="width: auto">
        {% for problem_counter in problems_per_page_options %}
        <option value="{{ problem_counter }}"
          {% if problem_counter == problems_per_page %}selected{% endif %}>
          {% if problem_counter == problem_list|length %}All{% else %}{{ problem_counter }}{% endif %} / page
        </option>
      {% endfor %}
    </select>
  </form>
</div>
<!-- Clear filters -->
<div class="mb-4">
  <a class="btn btn-warning px-2 py-0"
     href="{% url 'python_problems:problem-index' %}"
     role="button">Clear filters</a>
</div>
