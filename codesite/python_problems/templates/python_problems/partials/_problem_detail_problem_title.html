<div class="row mb-5">
  <div class="col">
    <div class="mb-5 d-flex justify-content-between">
      {% if prev_problem_slug %}
        <a href="{% url 'python_problems:problem-detail' prev_problem_slug language.name %}" class="btn btn-outline-secondary py-1">← Previous Problem</a>
      {% else %}
        <span class="btn btn-secondary disabled">← Previous</span>
      {% endif %}
      {% if next_problem_slug %}
        <a href="{% url 'python_problems:problem-detail' next_problem_slug language.name %}" class="btn btn-outline-secondary py-1">Next Problem →</a>
      {% else %}
        <span class="btn btn-secondary disabled">Next →</span>
      {% endif %}
    </div>
    <div class="row">
      {% if user == solution.owner %}
        <div class="col-auto">
          <div class="row">
            <a href="{% url 'python_problems:problem-update' problem.id %}?next={{ request.get_full_path|urlencode }}"
               class="btn btn-secondary py-0 mb-2 mt-2">Update</a>
          </div>
        </div>
      {% endif %}
      <h1>{{ problem.title }}</h1>
    </div>
  </div>
</div>
