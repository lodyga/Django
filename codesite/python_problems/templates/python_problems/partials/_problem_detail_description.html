{% load linked_list_filters %}
<div class="row mb-2">
  <button class="btn btn-outline-secondary py-0 mb-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#problemDescription"
          aria-expanded="true"
          aria-controls="problemDescription">
    Description:
    <i class="fas fa-chevron-up"></i>
  </button>
  <div id="problemDescription" class="collapse show">
    <pre class="mb-3" style="white-space: pre-wrap">{{ question }}
  </pre>
    {% if examples %}
      <div id="exampleButtonContainer" class="mb-3">
        {# Placeholder for JavaScript 'python_problems/problem-description.js' buttons #}
      </div>
      {% for example in examples %}
        <pre id="example-{{ forloop.counter }}"
             class="exampleContent mb-3"
             style="white-space: pre-wrap">{{ example }}</pre>
      {% endfor %}
    {% endif %}
  </div>
</div>
