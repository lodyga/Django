{% extends "core/base.html" %}
{% block title %}
  Tag
{% endblock title %}
{% block content %}
  {% load crispy_forms_tags %}
  <div class="container-fluid m-2">
    <div class="row">
      <div class="col-md-2">
        <a href="{% url 'python_problems:problem-index' %}"
           class="btn btn-secondary px-3 py-0 mb-5">Back</a>
      </div>
      <div class="col-md-8">
        <div class="mb-5 mt-5">
          <h2>Add a tag</h2>
          <form action="" method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-sm btn-secondary me-2">Submit</button>
            <a href="{{ next_url }}" class="btn btn-sm btn-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
