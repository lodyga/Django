{% extends "core/base.html" %}
{% block title %}
  Test Case
{% endblock title %}
{% block head %}
  {% load static %}
  {% load crispy_forms_tags %}
  <link rel="stylesheet"
        type="text/css"
        href="{% static 'python_problems/styles.css' %}">
{% endblock head %}
{% block content %}
  {% load crispy_forms_tags %}
  <div class="container-fluid m-2">
    <div class="row">
      <div class="col-md-2">
        <a href="{% url 'python_problems:problem-index' %}"
           class="btn btn-secondary px-3 py-0 m-1">Back</a>
      </div>
      <div class="col-md-8">
        <form action="" method="post">
          {% csrf_token %}
            {{ form|crispy }}
            <input type="hidden" name="next" value="{{ next_url }}">
            <button type="submit" class="btn btn-sm btn-secondary me-2">Submit</button>
            <a href="{{ next_url }}" class="btn btn-sm btn-secondary">Cancel</a>
        </form>
      </div>
      <div class="col-md-2"></div>
    </div>
  </div>
{% endblock content %}
