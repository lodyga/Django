{% extends "core/base.html" %}
{% block title %}
  Queue Animation
{% endblock title %}
{% block head %}
  {% load static %}
  <link rel="stylesheet"
        type="text/css"
        href="{% static 'animations/queue.css' %}">
  <script src="{% static 'animations/animate-queue.js' %}" defer></script>
{% endblock head %}
{% block content %}
  <div class="queue-container">
    <h1>Queue Animation</h1>
    <div class="queue-display" id="queue-display">
      <!-- Queue elements will be added here -->
    </div>
    <div class="controls">
      <input type="text" id="char-input" maxlength="1" placeholder="X" value="3">
      <button id="push-btn">Push</button>
      <button id="pop-btn">Pop</button>
    </div>
  </div>
{% endblock content %}
