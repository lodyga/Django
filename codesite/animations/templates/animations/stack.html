{% extends "core/base.html" %}
{% block title %}
  Stack Animation
{% endblock title %}
{% block head %}
  {% load static %}
  <link rel="stylesheet"
        type="text/css"
        href="{% static 'animations/stack.css' %}">
  <script src="{% static 'animations/animate-stack.js' %}" defer></script>
{% endblock head %}
{% block content %}
  <div class="stack-container">
    <h1>Stack Animation</h1>
    <div class="row justify-content-center mb-4">
      <div class="col-auto stack-display" id="stack-display">
        <!-- stack elements will be added here -->
      </div>
      <div class="col-auto controls">
        <input type="text" id="char-input" maxlength="1" placeholder="X" value="3">
        <button id="push-btn">Push</button>
        <button id="pop-btn">Pop</button>
      </div>
    </div>
  </div>
{% endblock content %}
